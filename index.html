<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Driving Tests</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        /* Цветовые палитры (Светлая и Тёмная) */
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            
            /* Светлая тема (по умолчанию) */
            --bg-body: #f3f4f6;
            --bg-app: #ffffff;
            --text-dark: #111827;
            --text-gray: #6b7280;
            --correct-bg: #d1fae5;
            --correct-text: #059669;
            --wrong-bg: #fee2e2;
            --wrong-text: #dc2626;
            --border: #e5e7eb;
            --btn-nav: #f9fafb;
            --header-bg: rgba(255, 255, 255, 0.9);
            
            --radius: 1rem;
        }

        /* Тёмная тема */
        body.dark-theme {
            --bg-body: #0f172a;
            --bg-app: #1e293b;
            --text-dark: #f8fafc;
            --text-gray: #94a3b8;
            --correct-bg: #064e3b;
            --correct-text: #34d399;
            --wrong-bg: #7f1d1d;
            --wrong-text: #f87171;
            --border: #334155;
            --btn-nav: #0f172a;
            --header-bg: rgba(30, 41, 59, 0.9);
        }

        /* Базовые стили */
        html { font-size: 16px; transition: font-size 0.3s ease; }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-dark);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            overscroll-behavior-y: none;
            overflow-y: scroll; /* ФИКС ПРЫЖКА СТРАНИЦЫ */
            transition: background-color 0.3s, color 0.3s;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            background: var(--bg-app);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 40px rgba(0,0,0,0.1);
            position: relative;
            transition: background-color 0.3s;
        }

        /* Анимации */
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none !important; }

        /* --- НОВАЯ ШАПКА --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 1.25rem;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 20;
            transition: all 0.3s;
        }
        
        .header-left, .header-right { display: flex; align-items: center; gap: 0.5rem; }
        
        .app-title { font-size: 1.25rem; font-weight: 700; color: var(--text-dark); }
        
        .timer { font-size: 1rem; font-weight: 700; color: var(--wrong-text); background: var(--wrong-bg); padding: 0.4rem 0.8rem; border-radius: 0.5rem; transition: 0.3s; }
        
        .icon-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dark);
            width: 2.5rem;
            height: 2.5rem;
            border-radius: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .icon-btn:hover { background: var(--btn-nav); border-color: var(--primary); }
        
        .zoom-btn { width: auto; padding: 0 0.8rem; font-size: 0.95rem; font-weight: 600; }

        /* --- КОНТЕЙНЕРЫ ЭКРАНОВ --- */
        .screen { flex: 1; padding: 1.25rem; overflow-y: auto; padding-bottom: 7rem; }

        /* --- ЭКРАН МЕНЮ --- */
        .test-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(6rem, 1fr));
            gap: 0.75rem;
            margin-top: 1.25rem;
        }
        .test-btn {
            background: var(--bg-app);
            border: 2px solid var(--border);
            color: var(--text-dark);
            padding: 1.2rem 0.5rem;
            border-radius: 0.75rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .test-btn:hover { border-color: var(--primary); color: var(--primary); box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15); }

        /* --- ЭКРАН ТЕСТА --- */
        .progress-container { width: 100%; background: var(--border); height: 0.4rem; border-radius: 0.2rem; margin-bottom: 1.25rem; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s ease; }
        
        .question-text { font-size: 1.25rem; font-weight: 600; line-height: 1.5; margin-bottom: 1.25rem; }
        .question-img { width: 100%; border-radius: var(--radius); margin-bottom: 1.25rem; border: 1px solid var(--border); object-fit: contain; max-height: 16rem; background: var(--bg-body);}
        
        .options-container { display: flex; flex-direction: column; gap: 0.75rem; }
        .option-btn {
            text-align: left;
            padding: 1.1rem 1.25rem;
            background: var(--btn-nav);
            border: 2px solid transparent;
            border-radius: 0.75rem;
            font-size: 1.05rem;
            font-weight: 500;
            line-height: 1.4;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--text-dark);
        }
        .option-btn:active { transform: scale(0.98); }
        .option-btn.selected { background: rgba(59, 130, 246, 0.1); border-color: var(--primary); color: var(--primary); }

        /* --- НИЖНЯЯ ПАНЕЛЬ НАВИГАЦИИ --- */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--header-bg);
            backdrop-filter: blur(10px);
            padding: 1rem 1.25rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            z-index: 10;
        }
        .action-btn {
            flex: 1;
            padding: 1rem;
            border: none;
            border-radius: 0.75rem;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }
        .action-btn:active { transform: scale(0.95); }
        .btn-prev { background: var(--border); color: var(--text-dark); flex: 0.4; }
        .btn-next { background: var(--primary); box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }

        /* --- ЭКРАН РЕЗУЛЬТАТОВ --- */
        .result-header { text-align: center; margin-bottom: 1.8rem; padding: 1.25rem; background: var(--btn-nav); border-radius: var(--radius); border: 1px solid var(--border); }
        .score-circle { width: 7rem; height: 7rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 700; margin: 0 auto 1rem auto; border: 0.5rem solid var(--primary); color: var(--primary); }
        
        .review-card { background: var(--bg-app); padding: 1.25rem; border-radius: var(--radius); margin-bottom: 1rem; border: 1px solid var(--border); }
        .review-card.wrong { border-left: 0.4rem solid var(--wrong-text); }
        .review-card.correct { border-left: 0.4rem solid var(--correct-text); }
        
        .badge { display: inline-block; padding: 0.25rem 0.6rem; border-radius: 0.4rem; font-size: 0.85rem; font-weight: 700; margin-bottom: 0.6rem; }
        .badge-correct { background: var(--correct-bg); color: var(--correct-text); }
        .badge-wrong { background: var(--wrong-bg); color: var(--wrong-text); }
        
        .ans-text { margin-top: 0.5rem; font-size: 0.95rem; }
        .ans-correct { color: var(--correct-text); font-weight: 600; }
        .ans-wrong { color: var(--wrong-text); text-decoration: line-through; }
        .ans-missed { color: var(--text-gray); font-style: italic; }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="header-left">
            <button id="btn-home" class="icon-btn hidden" onclick="backToMenu()" title="Back to Menu">🏠</button>
            <div class="app-title" id="top-title">Driving Tests</div>
        </div>
        <div class="header-right">
            <div id="timer" class="timer hidden">30:00</div>
            <button class="icon-btn zoom-btn" onclick="toggleZoom()" id="btn-zoom" title="Change Text Size">🔍 1x</button>
            <button class="icon-btn" onclick="toggleTheme()" id="btn-theme" title="Toggle Theme">🌙</button>
        </div>
    </header>

    <div id="screen-menu" class="screen fade-in">
        <h2 style="margin-top:0;">Select a Test</h2>
        <p style="color: var(--text-gray); margin-bottom: 1.5rem;">35 official tests. 30 minutes each.</p>
        <div class="test-grid" id="test-grid"></div>
        <div id="loading-msg" style="text-align: center; padding: 1.25rem; font-weight: bold; color: var(--primary);">Loading database...</div>
    </div>

    <div id="screen-quiz" class="screen hidden">
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div style="color: var(--text-gray); font-weight: 600; font-size: 0.9rem; margin-bottom: 0.6rem;" id="q-counter">Question 1 of 26</div>
        
        <div class="question-text fade-in" id="q-text"></div>
        <img id="q-image" class="question-img hidden fade-in" src="" alt="Question Image">
        
        <div class="options-container fade-in" id="q-options"></div>
    </div>

    <div id="quiz-nav" class="bottom-nav hidden">
        <button class="action-btn btn-prev" id="btn-prev" onclick="prevQuestion()">Back</button>
        <button class="action-btn btn-next" id="btn-next" onclick="nextQuestion()">Next</button>
    </div>

    <div id="screen-result" class="screen hidden">
        <div class="result-header fade-in">
            <h2 id="final-status" style="margin-top:0;">Test Complete</h2>
            <div class="score-circle" id="final-score">22</div>
            <p style="color: var(--text-gray); font-weight: 500; margin-bottom:0;" id="score-text">out of 26 correct</p>
        </div>
        
        <h3 style="margin: 1.5rem 0 1rem 0;">Test Review</h3>
        <div id="review-list"></div>
    </div>
</div>

<script>
    /* --- НАСТРОЙКИ UI (ТЕМА И ЗУМ) --- */
    let currentZoom = 1;
    let isDark = false;

    // Восстановление настроек из памяти браузера
    if (localStorage.getItem('theme') === 'dark') toggleTheme();
    if (localStorage.getItem('zoom')) {
        currentZoom = parseFloat(localStorage.getItem('zoom'));
        applyZoom();
    }

    function toggleTheme() {
        isDark = !isDark;
        document.body.classList.toggle('dark-theme', isDark);
        document.getElementById('btn-theme').innerText = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }

    function toggleZoom() {
        if (currentZoom === 1) currentZoom = 1.25;
        else if (currentZoom === 1.25) currentZoom = 1.5;
        else currentZoom = 1;
        applyZoom();
        localStorage.setItem('zoom', currentZoom);
    }

    function applyZoom() {
        // Меняем базовый размер шрифта html. Все rem-значения пересчитаются автоматически.
        document.documentElement.style.fontSize = (16 * currentZoom) + 'px';
        document.getElementById('btn-zoom').innerText = `🔍 ${currentZoom}x`;
    }

    /* --- ЛОГИКА ПРИЛОЖЕНИЯ --- */
    let allData = [];
    let currentTest = null;
    let currentQuestionIndex = 0;
    let userAnswers = [];
    let timerInterval = null;
    let timeRemaining = 1800;

    async function loadData() {
        try {
            const response = await fetch('data.json');
            allData = await response.json();
            allData.sort((a, b) => parseInt(a.test_id) - parseInt(b.test_id));
            document.getElementById('loading-msg').classList.add('hidden');
            renderMenu();
        } catch (error) {
            document.getElementById('loading-msg').innerHTML = '<span style="color:var(--wrong-text);">Error loading data.json. Start Local Server!</span>';
        }
    }

    function renderMenu() {
        const grid = document.getElementById('test-grid');
        grid.innerHTML = '';
        allData.forEach((test, index) => {
            const btn = document.createElement('button');
            btn.className = 'test-btn';
            btn.innerText = `Test ${test.test_id}`;
            btn.onclick = () => startTest(index);
            grid.appendChild(btn);
        });
    }

    function switchScreen(hideId, showId) {
        document.getElementById(hideId).classList.add('hidden');
        const showEl = document.getElementById(showId);
        showEl.classList.remove('hidden');
        showEl.classList.remove('fade-in'); 
        void showEl.offsetWidth; 
        showEl.classList.add('fade-in');
        document.querySelectorAll('.screen').forEach(el => el.scrollTop = 0);
    }

    function startTest(index) {
        currentTest = allData[index];
        currentQuestionIndex = 0;
        userAnswers = new Array(currentTest.questions.length).fill(null);
        timeRemaining = 1800;

        document.getElementById('top-title').innerText = `Test ${currentTest.test_id}`;
        document.getElementById('btn-home').classList.remove('hidden'); // Показываем кнопку Домой
        document.getElementById('timer').classList.remove('hidden');
        document.getElementById('quiz-nav').classList.remove('hidden');
        
        switchScreen('screen-menu', 'screen-quiz');
        startTimer();
        showQuestion();
    }

    function startTimer() {
        clearInterval(timerInterval);
        const timerEl = document.getElementById('timer');
        timerEl.style.color = 'var(--text-dark)';
        timerEl.style.backgroundColor = 'var(--border)';
        
        timerInterval = setInterval(() => {
            timeRemaining--;
            let m = Math.floor(timeRemaining / 60).toString().padStart(2, '0');
            let s = (timeRemaining % 60).toString().padStart(2, '0');
            timerEl.innerText = `${m}:${s}`;
            
            if (timeRemaining <= 180) {
                timerEl.style.color = 'var(--wrong-text)';
                timerEl.style.backgroundColor = 'var(--wrong-bg)';
            }
            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                finishTest();
            }
        }, 1000);
    }

    function showQuestion() {
        const q = currentTest.questions[currentQuestionIndex];
        const total = currentTest.questions.length;
        
        document.getElementById('progress-bar').style.width = `${((currentQuestionIndex + 1) / total) * 100}%`;
        document.getElementById('q-counter').innerText = `Question ${currentQuestionIndex + 1} of ${total}`;
        
        const textEl = document.getElementById('q-text');
        textEl.innerText = q.question;
        textEl.classList.remove('fade-in'); void textEl.offsetWidth; textEl.classList.add('fade-in');

        const imgEl = document.getElementById('q-image');
        if (q.image) {
            imgEl.src = q.image;
            imgEl.classList.remove('hidden');
            imgEl.classList.remove('fade-in'); void imgEl.offsetWidth; imgEl.classList.add('fade-in');
        } else {
            imgEl.classList.add('hidden');
        }

        const optionsContainer = document.getElementById('q-options');
        optionsContainer.innerHTML = '';
        optionsContainer.classList.remove('fade-in'); void optionsContainer.offsetWidth; optionsContainer.classList.add('fade-in');
        
        q.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt.text;
            
            if (userAnswers[currentQuestionIndex] === idx) {
                btn.classList.add('selected');
            }

            btn.onclick = () => {
                document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                userAnswers[currentQuestionIndex] = idx;
            };
            optionsContainer.appendChild(btn);
        });

        document.getElementById('btn-prev').style.display = currentQuestionIndex === 0 ? 'none' : 'block';
        
        const nextBtn = document.getElementById('btn-next');
        if (currentQuestionIndex === total - 1) {
            nextBtn.innerText = 'Finish Test';
            nextBtn.style.backgroundColor = 'var(--text-dark)';
            nextBtn.style.color = 'var(--bg-app)';
        } else {
            nextBtn.innerText = 'Next';
            nextBtn.style.backgroundColor = 'var(--primary)';
            nextBtn.style.color = 'white';
        }
    }

    function prevQuestion() {
        if (currentQuestionIndex > 0) {
            currentQuestionIndex--;
            showQuestion();
        }
    }

    function nextQuestion() {
        if (userAnswers[currentQuestionIndex] === null) {
            const opts = document.getElementById('q-options');
            opts.style.transform = 'translateX(10px)';
            setTimeout(() => opts.style.transform = 'translateX(-10px)', 100);
            setTimeout(() => opts.style.transform = 'translateX(0)', 200);
            return;
        }

        if (currentQuestionIndex < currentTest.questions.length - 1) {
            currentQuestionIndex++;
            showQuestion();
        } else {
            finishTest();
        }
    }

    function finishTest() {
        clearInterval(timerInterval);
        document.getElementById('timer').classList.add('hidden');
        document.getElementById('quiz-nav').classList.add('hidden');
        switchScreen('screen-quiz', 'screen-result');

        let correctCount = 0;
        const reviewList = document.getElementById('review-list');
        reviewList.innerHTML = '';

        currentTest.questions.forEach((q, qIdx) => {
            const userAnsIdx = userAnswers[qIdx];
            const correctOpt = q.options.find(o => o.isCorrect);
            const userOpt = userAnsIdx !== null ? q.options[userAnsIdx] : null;
            const isCorrect = userOpt && userOpt.isCorrect;

            if (isCorrect) correctCount++;

            const div = document.createElement('div');
            div.className = `review-card fade-in ${isCorrect ? 'correct' : 'wrong'}`;
            div.style.animationDelay = `${qIdx * 0.03}s`; 
            
            let userAnsHtml = '';
            if (userOpt) {
                userAnsHtml = isCorrect 
                    ? `<div class="ans-text ans-correct">✓ Your answer: ${userOpt.text}</div>`
                    : `<div class="ans-text ans-wrong">✗ Your answer: ${userOpt.text}</div>
                       <div class="ans-text ans-correct">✓ Correct answer: ${correctOpt.text}</div>`;
            } else {
                userAnsHtml = `<div class="ans-text ans-missed">⚠ Skipped. Correct answer: ${correctOpt.text}</div>`;
            }

            div.innerHTML = `
                <div class="badge ${isCorrect ? 'badge-correct' : 'badge-wrong'}">${isCorrect ? 'Correct' : 'Incorrect'}</div>
                <div style="font-weight: 600; font-size: 1.05rem; margin-bottom: 0.6rem;">${qIdx + 1}. ${q.question}</div>
                ${q.image ? `<img src="${q.image}" style="width:100%; max-width: 15rem; border-radius: 0.5rem; margin-bottom: 0.6rem; border: 1px solid var(--border);">` : ''}
                ${userAnsHtml}
            `;
            reviewList.appendChild(div);
        });

        const totalQ = currentTest.questions.length;
        const circle = document.getElementById('final-score');
        const status = document.getElementById('final-status');
        
        circle.innerText = correctCount;
        document.getElementById('score-text').innerText = `out of ${totalQ} correct`;
        
        const passMark = Math.floor(totalQ * 0.84);
        if (correctCount >= passMark) {
            status.innerText = "PASSED!";
            status.style.color = "var(--correct-text)";
            circle.style.borderColor = "var(--correct-text)";
            circle.style.color = "var(--correct-text)";
        } else {
            status.innerText = "FAILED";
            status.style.color = "var(--wrong-text)";
            circle.style.borderColor = "var(--wrong-text)";
            circle.style.color = "var(--wrong-text)";
        }
    }

    function backToMenu() {
        clearInterval(timerInterval);
        document.getElementById('screen-quiz').classList.add('hidden');
        document.getElementById('screen-result').classList.add('hidden');
        document.getElementById('quiz-nav').classList.add('hidden');
        document.getElementById('timer').classList.add('hidden');
        document.getElementById('btn-home').classList.add('hidden');
        
        const menu = document.getElementById('screen-menu');
        menu.classList.remove('hidden');
        menu.classList.remove('fade-in'); void menu.offsetWidth; menu.classList.add('fade-in');
        
        document.getElementById('top-title').innerText = "Driving Tests";
        window.scrollTo(0, 0);
    }

    loadData();
</script>

</body>
</html>
